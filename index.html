<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ระบบจัดการแข่งขันวิชาการสี</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: 'Noto Sans Thai', system-ui, sans-serif; -webkit-text-size-adjust: 100%; }
  .hidden { display: none !important; }
  .grid-cols-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
  @media (min-width: 768px) {
    .md\:flex { display: flex !important; }
    .md\:grid { display: grid !important; }
    .md\:hidden { display: none !important; }
    .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .md\:grid-cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .md\:gap-x-3 { column-gap: 0.75rem; }
    .md\:items-center { align-items: center !important; }
    .md\:p-6 { padding: 1.5rem !important; }
    .md\:pb-0 { padding-bottom: 0 !important; }
    .md\:rounded-2xl { border-radius: 1rem !important; }
    .md\:bottom-6 { bottom: 1.5rem !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;



/* ============================================================
   ระบบจัดการแข่งขันวิชาการสี — Prototype (Phase 1, ครบทุกหน้า)
   ข้อมูลทั้งหมดเป็น mock ในหน่วยความจำ · ยังไม่เชื่อม Google Sheet/Drive
   ============================================================ */

/* ---- color helpers + dynamic PASTEL theme (admin-controlled team colors) ---- */
const hexToRgb = (h) => { h = (h || "#cccccc").replace("#", ""); if (h.length === 3) h = h.split("").map((c) => c + c).join(""); const n = parseInt(h, 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; };
const toHex = (r, g, b) => "#" + [r, g, b].map((x) => Math.max(0, Math.min(255, Math.round(x))).toString(16).padStart(2, "0")).join("");
const darken = (hex, a) => { const [r, g, b] = hexToRgb(hex); return toHex(r * (1 - a), g * (1 - a), b * (1 - a)); };
const lighten = (hex, a) => { const [r, g, b] = hexToRgb(hex); return toHex(r + (255 - r) * a, g + (255 - g) * a, b + (255 - b) * a); };

const DEFAULT_HOUSES = [
  { name: "สีชมพู", color: "#eaa0ad" },
  { name: "สีฟ้า", color: "#93bce8" },
  { name: "สีเขียว", color: "#95d3b4" },
  { name: "สีเหลือง", color: "#ebca8a" },
];
// พื้นหลัง/ตัวอักษรเป็นโทนพาสเทลนุ่ม · primary/soft ผูกกับ "สีทีมที่ 1" ที่แอดมินกำหนด
function makeTheme(themeColor) {
  return {
    bg: "#f8f5fb", surface: "#ffffff", ink: "#413c54", muted: "#8d879e", line: "#ece6f0",
    primary: darken(themeColor, 0.26), primaryDark: darken(themeColor, 0.42),
    gold: "#cf9f52", soft: lighten(themeColor, 0.80),
  };
}
// module-level; <App/> reassigns these from admin settings on every render
let C = makeTheme(DEFAULT_HOUSES[0].color);
let HOUSES = DEFAULT_HOUSES.map((h) => h.color);

/* ---------------- seed data ---------------- */
const seed = {
  students: [],
  teachers: [],
  assistants: [],
  orgTeacher: [],
  orgStudent: [],
  competitions: [],
  archived: [],
  settings: { maxMain: 3, themeColor: DEFAULT_HOUSES[0].color, houses: DEFAULT_HOUSES, announce: { speed: 18, showLines: 3, lines: [
    "ยินดีต้อนรับสู่การแข่งขันวิชาการสี",
  ] } },
};

/* ---------------- utils + primitives ---------------- */
const initials = (a = "", b = "") => (a[0] || "") + (b[0] || "");
const fullName = (p) => `${p.pre || ""}${p.first} ${p.last}`;

function Avatar({ person, size = 44 }) {
  const h = HOUSES[person?.house ?? 0] || HOUSES[0] || "#c9c3d6";
  if (person?.photoUrl) {
    return <img src={person.photoUrl} alt="" referrerPolicy="no-referrer" style={{ width: size, height: size, borderRadius: 12, objectFit: "cover", flexShrink: 0, border: `1.5px solid ${h}55`, background: h + "22" }} />;
  }
  return (
    <div style={{ width: size, height: size, borderRadius: 12, flexShrink: 0, background: h + "22", color: h,
      border: `1.5px solid ${h}55`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: size * 0.36 }}>
      {initials(person?.first, person?.last)}
    </div>
  );
}
function Ribbon({ h = 4 }) {
  const cols = HOUSES.length ? HOUSES : ["#c9c3d6"];
  return <div style={{ display: "flex", height: h, width: "100%" }}>{cols.map((c, i) => <div key={i} style={{ flex: 1, background: c }} />)}</div>;
}
function Card({ children, style }) {
  return <div style={{ background: C.surface, borderRadius: 16, border: `1px solid ${C.line}`, ...style }}>{children}</div>;
}
function Btn({ children, onClick, variant = "primary", small, disabled }) {
  const v = {
    primary: { background: C.primary, color: "#fff", border: "none" },
    ghost: { background: C.surface, color: C.ink, border: `1px solid ${C.line}` },
    gold: { background: C.gold, color: "#fff", border: "none" },
    danger: { background: "#fdecec", color: "#c0392b", border: "1px solid #f3c9c9" },
    soft: { background: C.soft, color: C.primaryDark, border: "none" },
  }[variant];
  return (
    <button onClick={onClick} disabled={disabled}
      style={{ ...v, opacity: disabled ? 0.5 : 1, padding: small ? "7px 12px" : "10px 16px", borderRadius: 11, fontWeight: 600, fontSize: small ? 13 : 14, cursor: disabled ? "not-allowed" : "pointer", whiteSpace: "nowrap" }}>
      {children}
    </button>
  );
}
function Field({ label, value, onChange, placeholder, type }) {
  return (
    <label style={{ display: "block", marginBottom: 12 }}>
      <span style={{ display: "block", fontSize: 13, color: C.muted, marginBottom: 5 }}>{label}</span>
      <input value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} type={type || "text"}
        style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${C.line}`, fontSize: 14, color: C.ink, fontWeight: 500, outline: "none", background: "#fbfcfb" }} />
    </label>
  );
}
const selStyle = { padding: "9px 12px", borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.ink, fontSize: 14 };
function Select({ value, onChange, children }) {
  return <select value={value} onChange={(e) => onChange(e.target.value)} style={selStyle}>{children}</select>;
}
function PageHead({ title, sub, right }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
      <div>
        <h1 style={{ fontSize: 20, fontWeight: 800, color: C.ink, margin: 0 }}>{title}</h1>
        {sub && <p style={{ color: C.muted, fontSize: 13, margin: "4px 0 0" }}>{sub}</p>}
      </div>
      {right}
    </div>
  );
}
function Tabs({ tabs, active, onChange }) {
  return (
    <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4, marginBottom: 14 }}>
      {tabs.map((t) => (
        <button key={t.key} onClick={() => onChange(t.key)}
          style={{ padding: "8px 14px", borderRadius: 20, border: "none", cursor: "pointer", whiteSpace: "nowrap", fontSize: 13.5, fontWeight: active === t.key ? 700 : 500,
            background: active === t.key ? C.primary : C.surface, color: active === t.key ? "#fff" : C.ink, boxShadow: active === t.key ? "none" : `inset 0 0 0 1px ${C.line}` }}>
          {t.label}
        </button>
      ))}
    </div>
  );
}
function Badge({ status }) {
  const map = { main: ["ตัวจริง", "#5aab84"], reserve: ["ตัวสำรอง", C.gold], rejected: ["ไม่ผ่านคัดเลือก", "#d17f7a"] };
  const [txt, col] = map[status] || [status, C.muted];
  return <span style={{ fontSize: 12, fontWeight: 700, color: col, background: col + "18", padding: "3px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>{txt}</span>;
}

function Modal({ title, onClose, children, wide }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 50, background: "rgba(15,25,40,.45)", display: "flex", alignItems: "flex-end", justifyContent: "center" }} className="md:items-center md:p-6">
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.surface, width: "100%", maxWidth: wide ? 720 : 480, maxHeight: "90vh", overflow: "hidden", borderRadius: "18px 18px 0 0", display: "flex", flexDirection: "column" }} className="md:rounded-2xl">
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 18px", borderBottom: `1px solid ${C.line}` }}>
          <span style={{ fontWeight: 700, color: C.ink, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} aria-label="ปิด" style={{ width: 34, height: 34, borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.muted, fontSize: 18, cursor: "pointer" }}>×</button>
        </div>
        <div style={{ padding: 18, overflowY: "auto" }}>{children}</div>
      </div>
    </div>
  );
}
function LoadingModal({ label }) {
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 60, background: "rgba(15,25,40,.5)", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ background: C.surface, borderRadius: 16, padding: "26px 34px", display: "flex", flexDirection: "column", alignItems: "center", gap: 14, minWidth: 220 }}>
        <div style={{ width: 40, height: 40, borderRadius: "50%", border: `4px solid ${C.line}`, borderTopColor: C.primary, animation: "spin .8s linear infinite" }} />
        <span style={{ color: C.ink, fontWeight: 600, fontSize: 14 }}>{label}</span>
        <span style={{ color: C.muted, fontSize: 12 }}>กรุณารอสักครู่ ระบบจะปิดเองเมื่อเสร็จ</span>
      </div>
    </div>
  );
}
function Toast({ msg }) {
  return (
    <div style={{ position: "fixed", bottom: 84, left: "50%", transform: "translateX(-50%)", zIndex: 70, background: C.ink, color: "#fff", padding: "10px 18px", borderRadius: 22, fontSize: 13.5, fontWeight: 600 }} className="md:bottom-6">
      {msg}
    </div>
  );
}
function ExportBar({ run }) {
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      <Btn variant="ghost" small onClick={() => window.print()}>ปริ้นท์</Btn>
      <Btn variant="ghost" small onClick={() => run("กำลังสร้างไฟล์ PDF...")}>PDF</Btn>
      <Btn variant="ghost" small onClick={() => run("กำลังสร้างไฟล์ Excel...")}>Excel</Btn>
      <Btn variant="ghost" small onClick={() => run("กำลังบันทึกภาพหน้าจอ...")}>แคปหน้าจอ</Btn>
    </div>
  );
}
function SearchPersonPopup({ pool, onPick, onClose, title, emptyText }) {
  const [q, setQ] = useState("");
  const list = pool.filter((p) => (fullName(p) + p.id).includes(q));
  return (
    <Modal title={title} onClose={onClose}>
      <input autoFocus value={q} onChange={(e) => setQ(e.target.value)} placeholder="ค้นหาชื่อ / รหัส"
        style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${C.line}`, marginBottom: 12, fontSize: 14 }} />
      <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 320, overflowY: "auto" }}>
        {list.map((p) => (
          <button key={p.id} onClick={() => onPick(p)} style={{ display: "flex", alignItems: "center", gap: 10, padding: 8, borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, cursor: "pointer", textAlign: "left" }}>
            <Avatar person={p} size={38} />
            <div><div style={{ fontWeight: 600, color: C.ink, fontSize: 13.5 }}>{fullName(p)}</div><div style={{ fontSize: 11, color: C.muted }}>รหัส {p.id}</div></div>
          </button>
        ))}
        {list.length === 0 && <div style={{ textAlign: "center", color: C.muted, padding: 20, fontSize: 13 }}>{pool.length === 0 && emptyText ? emptyText : "ไม่พบรายชื่อ"}</div>}
      </div>
    </Modal>
  );
}

/* ---------------- Landing ---------------- */
function Landing({ onLogin, announce, comps }) {
  const [speed, setSpeed] = useState(announce.speed);
  const [showSchedule, setShowSchedule] = useState(false);
  const allSch = comps.flatMap((c) => c.schedule.map((s) => ({ ...s, name: c.name })));
  const news = announce.lines;
  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <Ribbon />
      <header style={{ background: C.surface, borderBottom: `1px solid ${C.line}` }}>
        <div style={{ maxWidth: 1080, margin: "0 auto", padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <Brand sub="ระบบจัดการแข่งขัน" />
          <Btn onClick={onLogin} small>เข้าสู่ระบบ</Btn>
        </div>
      </header>
      <main style={{ maxWidth: 1080, margin: "0 auto", padding: 18, display: "flex", flexDirection: "column", gap: 16 }}>
        <Card style={{ overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 16px", borderBottom: `1px solid ${C.line}` }}>
            <span style={{ background: C.gold, color: "#fff", fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 20 }}>ประชาสัมพันธ์</span>
            <span style={{ fontSize: 12, color: C.muted, marginLeft: "auto" }}>ความเร็ว</span>
            <input type="range" min="6" max="30" value={36 - speed} onChange={(e) => setSpeed(36 - Number(e.target.value))} style={{ width: 90 }} />
          </div>
          <div style={{ height: 116, overflow: "hidden", padding: "0 16px" }}>
            <div style={{ animation: `scrollUp ${speed}s linear infinite` }}>
              {[...news, ...news].map((n, i) => <div key={i} style={{ padding: "10px 0", borderBottom: `1px dashed ${C.line}`, color: C.ink, fontSize: 14 }}>• {n}</div>)}
            </div>
          </div>
          <button onClick={() => setShowSchedule(true)} style={{ width: "100%", padding: 12, background: C.soft, color: C.primaryDark, fontWeight: 700, border: "none", cursor: "pointer", fontSize: 14 }}>ดูกำหนดการแข่งขันทุกรายการ →</button>
        </Card>
        <div style={{ display: "grid", gap: 16 }} className="md:grid-cols-2">
          <Card>
            <BlockHead dot="#2f9e6b" title="รายการแข่งขันวันนี้" />
            <div style={{ padding: 8 }}>
              {allSch.slice(0, 2).map((s, i) => <SchRow key={i} s={s} status="กำลังแข่ง" />)}
              {allSch.length === 0 && <Empty text="ยังไม่มีรายการวันนี้" />}
            </div>
          </Card>
          <Card>
            <BlockHead dot={C.gold} title="รายการแข่งขันรอบต่อไป" />
            <div style={{ padding: 8 }}>{allSch.slice(2).map((s, i) => <SchRow key={i} s={s} status="รอบต่อไป" />)}{allSch.length < 3 && <Empty text="ยังไม่มีรอบต่อไป" />}</div>
          </Card>
        </div>
      </main>
      {showSchedule && (
        <Modal title="กำหนดการแข่งขันทั้งหมด" onClose={() => setShowSchedule(false)} wide>
          {allSch.map((s, i) => <SchRow key={i} s={s} status="กำหนดการ" />)}
          {allSch.length === 0 && <Empty text="ยังไม่มีกำหนดการ" />}
        </Modal>
      )}
    </div>
  );
}
function Brand({ sub }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ width: 40, height: 40, borderRadius: 12, background: C.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 18 }}>สี</div>
      <div><div style={{ fontWeight: 800, color: C.ink, fontSize: 16, lineHeight: 1.1 }}>วิชาการสี</div><div style={{ fontSize: 12, color: C.muted }}>{sub}</div></div>
    </div>
  );
}
function BlockHead({ dot, title }) {
  return <div style={{ padding: "12px 16px", borderBottom: `1px solid ${C.line}`, display: "flex", alignItems: "center", gap: 8 }}><span style={{ width: 8, height: 8, borderRadius: "50%", background: dot }} /><span style={{ fontWeight: 700, color: C.ink }}>{title}</span></div>;
}
function SchRow({ s, status }) {
  const col = status === "กำลังแข่ง" ? "#2f9e6b" : status === "รอบต่อไป" ? C.gold : C.primary;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 8px" }}>
      <div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 600, color: C.ink, fontSize: 14 }}>{s.name}</div><div style={{ fontSize: 12, color: C.muted }}>{s.date} {s.time} · {s.place}</div></div>
      <span style={{ fontSize: 12, fontWeight: 700, color: col, background: col + "18", padding: "4px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>{status}</span>
    </div>
  );
}
function Empty({ text }) { return <div style={{ textAlign: "center", color: C.muted, padding: 24, fontSize: 13.5 }}>{text}</div>; }

/* ---------------- Login ---------------- */
// ลำดับการตรวจสอบ: แอดมิน → ผู้ช่วยแอดมิน → กรรมการครู → กรรมการนักเรียน → นักเรียนทั่วไป
function acceptedTeacherPw(t) {
  const arr = [String(t.user || t.id)];
  if (t.phone) arr.push(String(t.phone).replace(/\D/g, ""));
  if (t.password) arr.push(String(t.password));
  return arr;
}
function acceptedStudentPw(s) {
  const arr = [];
  if (s.phone) arr.push(String(s.phone).replace(/\D/g, ""));
  if (s.password) arr.push(String(s.password));
  if (arr.length === 0) arr.push(String(s.id)); // ชั่วคราว: ยังไม่มีเบอร์/ไม่ได้ตั้งรหัสเอง
  return arr;
}
function studentProfileComplete(s) {
  return !!(s.phone && s.password && s.guardian && s.guardianPhone && s.guardianRelation);
}
function resolveLogin(db, uRaw, pRaw) {
  const u = (uRaw || "").trim();
  const p = (pRaw || "").trim();
  const pd = p.replace(/\D/g, "");
  if (!u) return null;
  if (u === "admin" && p === "admin123") return { role: "admin", name: "ผู้ดูแลระบบ" };
  const a = db.assistants.find((x) => x.user === u && x.password === p);
  if (a) return { role: "admin", name: a.name, assistant: true };
  const t = db.teachers.find((x) => x.user && String(x.user) === u && (acceptedTeacherPw(x).includes(p) || acceptedTeacherPw(x).includes(pd)));
  if (t) return { role: "teacher", id: t.id, name: fullName(t) };
  const s = db.students.find((x) => String(x.id) === u && (acceptedStudentPw(x).includes(p) || acceptedStudentPw(x).includes(pd)));
  if (s) {
    const usedTemp = !s.phone && !s.password && (p === String(s.id));
    return { role: s.committee ? "studentcom" : "student", id: s.id, name: fullName(s), needsProfile: usedTemp };
  }
  return null;
}
function Login({ db, onEnter, onBack }) {
  const [u, setU] = useState("");
  const [p, setP] = useState("");
  const [err, setErr] = useState("");
  const submit = () => {
    const auth = resolveLogin(db, u, p);
    if (auth) { localStorage.setItem("auth", JSON.stringify(auth)); setErr(""); onEnter(auth); }
    else setErr("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
  };
  const inp = { width: "100%", padding: "11px 12px", borderRadius: 10, border: `1px solid ${C.line}`, fontSize: 14, color: C.ink, outline: "none", background: "#fbfafd", marginBottom: 12 };
  return (
    <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column" }}>
      <Ribbon />
      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 18 }}>
        <Card style={{ width: "100%", maxWidth: 400, padding: 24 }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ width: 52, height: 52, borderRadius: 14, background: C.primary, color: "#fff", display: "inline-flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 22 }}>สี</div>
            <div style={{ fontWeight: 800, color: C.ink, fontSize: 18, marginTop: 10 }}>เข้าสู่ระบบ</div>
            <div style={{ fontSize: 13, color: C.muted }}>กรอกชื่อผู้ใช้และรหัสผ่าน</div>
          </div>
          <label style={{ display: "block", fontSize: 13, color: C.muted, marginBottom: 5 }}>ชื่อผู้ใช้ (user)</label>
          <input value={u} onChange={(e) => setU(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} style={inp} placeholder="เช่น admin หรือ รหัสนักเรียน" />
          <label style={{ display: "block", fontSize: 13, color: C.muted, marginBottom: 5 }}>รหัสผ่าน (password)</label>

function useUI() {
  const [loading, setLoading] = useState(null);
  const [toast, setToast] = useState(null);
  const run = (label, cb, ms = 1300) => { setLoading(label); setTimeout(() => { cb && cb(); setLoading(null); }, ms); };
  const runAsync = async (label, fn) => { setLoading(label); try { await fn(); } finally { setLoading(null); } };
  const notify = (m) => { setToast(m); setTimeout(() => setToast(null), 1800); };
  return { loading, toast, run, runAsync, notify };
}

/* ---------------- image upload / delete (Google Drive via Apps Script) ---------------- */
function resizeImage(file, max = 300) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let w = img.width, h = img.height;
      const scale = Math.min(1, max / Math.max(w, h));
      w = Math.max(1, Math.round(w * scale)); h = Math.max(1, Math.round(h * scale));
      const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(cv.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = reject;
    img.src = url;
  });
}
async function uploadImageRemote(dataUrl, person, kind, oldFileId) {
  if (!API_URL || !dataUrl) return null;
  const base64 = dataUrl.split(",")[1];
  const body = JSON.stringify({
    type: "uploadImage", kind, id: person.id,
    name: `${person.first || ""} ${person.last || ""}`.trim() || String(person.id || "photo"),
    grade: person.grade || "", room: person.room || "", base64, oldFileId: oldFileId || "",
  });
  try {
    const r = await fetch(API_URL, { method: "POST", body });
    const j = await r.json();
    return j && j.ok ? { photoId: j.fileId, photoUrl: j.url } : null;
  } catch (e) { return null; }
}
function deleteImageRemote(person, kind) {
  if (!API_URL || !person || !person.photoId) return;
  const body = JSON.stringify({ type: "deleteImage", fileId: person.photoId, kind, grade: person.grade || "", room: person.room || "" });
  fetch(API_URL, { method: "POST", body }).catch(() => {});
}
// ย้ายไฟล์รูปไปโฟลเดอร์ชั้น/ห้องใหม่ใน Drive (และลบโฟลเดอร์เดิมถ้าว่าง)
function moveImageRemote(person, kind, toGrade, toRoom) {
  if (!API_URL || !person || !person.photoId) return;
  const body = JSON.stringify({ type: "moveImage", fileId: person.photoId, kind, fromGrade: person.grade || "", fromRoom: person.room || "", toGrade: toGrade || "", toRoom: toRoom || "" });
  fetch(API_URL, { method: "POST", body }).catch(() => {});
}
// ลำดับชั้นเรียนสำหรับเลื่อนชั้น
const GRADE_ORDER = ["อ.1", "อ.2", "อ.3", "ป.1", "ป.2", "ป.3", "ป.4", "ป.5", "ป.6", "ม.1", "ม.2", "ม.3", "ม.4", "ม.5", "ม.6"];
function nextGrade(g) {
  const i = GRADE_ORDER.indexOf((g || "").trim());
  if (i < 0 || i === GRADE_ORDER.length - 1) return null; // ไม่รู้จัก หรือ ชั้นสูงสุด → จบออก
  return GRADE_ORDER[i + 1];
}

function PromotePanel({ db, setDb, ui }) {
  const students = db.students;
  const grades = [...new Set(students.map((s) => s.grade).filter(Boolean))].sort((a, b) => GRADE_ORDER.indexOf(a) - GRADE_ORDER.indexOf(b));
  const rooms = [...new Set(students.map((s) => s.room).filter(Boolean))];
  const [gradGrades, setGradGrades] = useState([]); // ชั้นที่จะจบออก
  const [confirmWhole, setConfirmWhole] = useState(false);
  // group move
  const [fg, setFg] = useState(""); const [fr, setFr] = useState("");
  const [sel, setSel] = useState([]);
  const [tGrade, setTGrade] = useState(""); const [tRoom, setTRoom] = useState("");
  const filtered = students.filter((s) => (!fg || s.grade === fg) && (!fr || s.room === fr));
  const selSet = new Set(sel);
  const allSel = filtered.length > 0 && filtered.every((s) => selSet.has(s.id));
  const toggle = (id) => setSel((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);

  const toggleGrad = (g) => setGradGrades((p) => p.includes(g) ? p.filter((x) => x !== g) : [...p, g]);
  const willGrad = students.filter((s) => gradGrades.includes(s.grade) || nextGrade(s.grade) === null);
  const willMove = students.length - willGrad.length;

  const runWhole = () => {
    const gset = new Set(gradGrades);
    ui.run("กำลังเลื่อนชั้นทั้งโรงเรียน...", () => {
      setDb((p) => {
        const stay = [], grad = [];
        p.students.forEach((s) => {
          const ng = nextGrade(s.grade);
          if (gset.has(s.grade) || ng === null) grad.push({ ...s, archivedFrom: `${s.grade || "?"}/${s.room || "?"}`, archivedAt: Date.now(), archivedReason: "จบการศึกษา/เลื่อนออก" });
          else stay.push({ ...s, grade: ng });
        });
        const gradIds = new Set(grad.map((g) => g.id));
        const orgStudent = p.orgStudent.map((r) => ({ ...r, people: r.people.filter((pid) => !gradIds.has(pid)) }));
        const competitions = p.competitions.map((c) => { const results = { ...c.results }; grad.forEach((g) => { delete results[g.id]; }); return { ...c, participants: c.participants.filter((x) => !gradIds.has(x.sid)), results }; });
        return { ...p, students: stay, archived: [...(p.archived || []), ...grad], orgStudent, competitions };
      });
      setConfirmWhole(false);
      ui.notify("เลื่อนชั้นเรียบร้อย");
    });
  };
  const runMove = () => {
    if (!tGrade) { ui.notify("กรุณาระบุชั้นปลายทาง"); return; }
    ui.run("กำลังย้าย...", () => {
      sel.forEach((id) => { const s = students.find((x) => x.id === id); if (s && s.photoId) moveImageRemote(s, "student", tGrade, tRoom); });
      setDb((p) => ({ ...p, students: p.students.map((s) => sel.includes(s.id) ? { ...s, grade: tGrade, room: tRoom } : s) }));
      setSel([]);
      ui.notify("ย้ายเรียบร้อย");
    });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Card style={{ padding: 16 }}>
        <div style={{ fontWeight: 700, color: C.ink, marginBottom: 6 }}>เลื่อนชั้นทั้งโรงเรียน</div>

          {grades.map((g) => {
            const on = gradGrades.includes(g) || nextGrade(g) === null;

function PersonList({ kind, db, setDb, ui }) {

  const toggle = (id) => setSel((p) => p.includes(id) ? p.filter((x) => x !== id) : [...p, id]);

  // ลบ พร้อมตัดความเกี่ยวข้องทั้งหมด (ผังองค์กร, ผู้เข้าแข่ง, ผลการแข่ง) และลบรูปใน Drive
  const purge = (ids) => {
    const idset = new Set(ids);
    ids.forEach((id) => { const person = list.find((x) => x.id === id); if (person) deleteImageRemote(person, kind); });
    ui.run("กำลังลบข้อมูลและความเกี่ยวข้อง...", () => {
      setDb((p) => {
        const next = { ...p };
        next[key] = p[key].filter((x) => !idset.has(x.id));
        next.orgTeacher = p.orgTeacher.map((r) => kind === "teacher" ? { ...r, people: r.people.filter((pid) => !idset.has(pid)) } : r);
        next.orgStudent = p.orgStudent.map((r) => kind === "student" ? { ...r, people: r.people.filter((pid) => !idset.has(pid)) } : r);
        if (kind === "student") {
          next.competitions = p.competitions.map((c) => {
            const results = { ...c.results }; ids.forEach((id) => { delete results[id]; });
            return { ...c, participants: c.participants.filter((x) => !idset.has(x.sid)), results };
          });
        }
        return next;
      });
      setSel((p) => p.filter((x) => !idset.has(x)));
      setConfirm(null);
    });
  };

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];

    if (typeof XLSX === "undefined") { ui.notify("โหลดตัวอ่าน Excel ไม่สำเร็จ (ต้องมีอินเทอร์เน็ต)"); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
        if (!rows.length) { ui.notify("ไฟล์ว่างเปล่า"); return; }

    const sample = kind === "student"
      ? ["10234", "0812345678", "เด็กชาย", "ปกรณ์", "มั่นคง", "ม.3", "1", "ชาย", "สีแดง"]

    XLSX.writeFile(wb, kind === "student" ? "template_students.xlsx" : "template_teachers.xlsx");
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <span style={{ fontSize: 13, color: C.muted }}>{filtered.length} รายการ{sel.length ? ` · เลือก ${sel.length}` : ""}</span>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input id={"xlsx-" + kind} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{ display: "none" }} />
          <Btn variant="ghost" small onClick={downloadTemplate}>แม่แบบ</Btn>

      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, color: C.ink, cursor: "pointer" }}>

        </label>
        {sel.length > 0 && <Btn variant="danger" small onClick={() => setConfirm({ ids: sel, msg: `ลบผู้ที่เลือก ${sel.length} รายการ พร้อมตัดความเกี่ยวข้อง (ผังองค์กร/ผู้เข้าแข่ง/ผลแข่ง) และลบรูปใน Drive ?` })}>ลบที่เลือก ({sel.length})</Btn>}
        {list.length > 0 && <Btn variant="danger" small onClick={() => setConfirm({ ids: list.map((s) => s.id), msg: `ลบ${kindLabel}ทั้งหมด ${list.length} รายการ พร้อมตัดความเกี่ยวข้องและลบรูปทั้งหมด ? การกระทำนี้ย้อนกลับไม่ได้` })}>ลบทั้งหมด</Btn>}
      </div>

      {kind === "student" && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Select value={grade} onChange={setGrade}><option value="">ทุกระดับชั้น</option>{grades.map((g) => <option key={g}>{g}</option>)}</Select>
          <Select value={room} onChange={setRoom}><option value="">ทุกห้อง</option>{rooms.map((r) => <option key={r} value={r}>ห้อง {r}</option>)}</Select>
        </div>

        {filtered.map((s) => (
          <Card key={s.id} style={{ padding: 12, display: "flex", alignItems: "center", gap: 10, outline: selSet.has(s.id) ? `2px solid ${C.primary}` : "none" }}>
            <input type="checkbox" checked={selSet.has(s.id)} onChange={() => toggle(s.id)} style={{ width: 17, height: 17, flexShrink: 0 }} />
            <Avatar person={s} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 700, color: C.ink, fontSize: 14 }}>{fullName(s)}</div>
              <div style={{ fontSize: 12, color: C.muted }}>รหัส {s.id}{s.grade ? ` · ${s.grade}/${s.room}` : ""} · {s.phone}</div>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <Btn variant="ghost" small onClick={() => setEdit(s)}>แก้ไข</Btn>
              <Btn variant="danger" small onClick={() => setConfirm({ ids: [s.id], msg: `ลบ ${fullName(s)} พร้อมตัดความเกี่ยวข้องและลบรูปใน Drive ?` })}>ลบ</Btn>
            </div>
          </Card>

        {filtered.length === 0 && <Empty text="ไม่พบรายชื่อตามเงื่อนไข" />}
      </div>
      {(add || edit) && <PersonForm kind={kind} person={edit} ui={ui} houses={db.settings.houses} onClose={() => { setAdd(false); setEdit(null); }} onSave={save} />}
      {rawRows && <ImportPreview kind={kind} rawRows={rawRows} existing={list} houses={db.settings.houses} onClose={() => setRawRows(null)} onConfirm={(rows) => ui.run("กำลังโอนเข้าระบบ...", () => { setDb((p) => ({ ...p, [key]: [...p[key], ...rows] })); setRawRows(null); ui.notify(`โอนเข้าระบบแล้ว ${rows.length} คน`); })} />}
      {confirm && <ConfirmModal title="ยืนยันการลบ" message={confirm.msg} onConfirm={() => purge(confirm.ids)} onClose={() => setConfirm(null)} />}
    </div>

function PersonForm({ kind, person, onClose, onSave, ui, houses }) {

  const [preview, setPreview] = useState(person?.photoUrl || "");

    catch (err) { ui.notify("อ่านรูปไม่ได้"); }
  };
  const clearPhoto = () => { setPreview(""); setNewPhoto(""); setF((p) => ({ ...p, photoUrl: undefined, photoId: undefined })); };
  const submit = () => ui.runAsync(newPhoto ? "กำลังอัปโหลดรูปและบันทึก..." : "กำลังบันทึก...", async () => {
    let data = { ...f };
    if (newPhoto) {
      const up = await uploadImageRemote(newPhoto, data, kind, person && person.photoId);
      if (up) { data.photoUrl = up.photoUrl; data.photoId = up.photoId; }
      else if (!API_URL) { ui.notify("โหมดทดลอง: รูปจะไม่ถูกบันทึกถาวร"); data.photoUrl = newPhoto; }
      else { ui.notify("อัปโหลดรูปไม่สำเร็จ (ตรวจการเชื่อม Drive)"); }
    } else if (person && person.photoId && !data.photoId) {
      deleteImageRemote(person, kind);
    }
    onSave(data, !!person);

/* ----- Excel/CSV import: อ่านทุกเซล เดาชนิดคอลัมน์ + จับคู่เองได้ ----- */
const IMP_PREFIXES = ["เด็กชาย", "เด็กหญิง", "นางสาว", "นาย", "นาง", "ด.ช.", "ด.ญ.", "น.ส.", "ด.ช", "ด.ญ", "น.ส"];
const PREFIX_FULL = { "ด.ช.": "เด็กชาย", "ด.ช": "เด็กชาย", "ดช": "เด็กชาย", "ด.ญ.": "เด็กหญิง", "ด.ญ": "เด็กหญิง", "ดญ": "เด็กหญิง", "น.ส.": "นางสาว", "น.ส": "นางสาว", "นส": "นางสาว", "นาย": "นาย", "นาง": "นาง", "นางสาว": "นางสาว", "เด็กชาย": "เด็กชาย", "เด็กหญิง": "เด็กหญิง" };
const expandPrefix = (p) => { const k = String(p || "").trim().replace(/\s/g, ""); return PREFIX_FULL[k] || String(p || "").trim(); };
const impClean = (v) => String(v == null ? "" : v).trim().replace(/\s+/g, " ");
const cleanDigits = (v) => String(v == null ? "" : v).replace(/[^\d]/g, "");
function impSplitName(full) {
  full = impClean(full);
  let pre = "";
  for (const p of IMP_PREFIXES) { if (full.startsWith(p)) { pre = p; full = full.slice(p.length).trim(); break; } }
  const parts = full.split(" ").filter(Boolean);
  return { pre, first: parts[0] || "", last: parts.slice(1).join(" ") };
}
function impSplitGradeRoom(v) {
  v = impClean(v);
  if (!v) return { grade: "", room: "" };
  if (v.includes("/")) { const a = v.split("/"); return { grade: impClean(a[0]), room: impClean(a.slice(1).join("/")) }; }
  const m = v.match(/^(.*?)[\s\-]+(\S+)$/);
  if (m) return { grade: impClean(m[1]), room: impClean(m[2]) };
  return { grade: v, room: "" };
}
const impIsHeader = (row) => /รหัส|ชื่อ|ชั้น|เบอร์|สกุล|คำนำหน้า|โทร|เพศ|สี|ทีม/.test((row || []).map(impClean).join(" "));

// เดาชนิดของค่าในเซลเดียว
function classifyCell(v, teamNames) {
  const s = impClean(v);
  if (!s) return "empty";
  const isNum = /^[0-9\s\-()]+$/.test(s);
  const d = cleanDigits(s);
  if (isNum && d.length) {
    if (d[0] === "0" && d.length >= 9 && d.length <= 10) return "phone";
    if (d[0] !== "0" && d.length >= 5 && d.length <= 10) return "id";
    if (d.length <= 2) return "room";
    return "num";
  }
  const noSp = s.replace(/\s/g, "");
  if (PREFIX_FULL[noSp]) return s.includes(" ") ? "fullName" : "pre";
  if (IMP_PREFIXES.some((p) => s.startsWith(p) || noSp.startsWith(p))) return "fullName";
  if (/(ม|ป|อ)\.?\s*\d+\s*\/\s*\d+/.test(noSp) || /^\d{1,2}\s*\/\s*\d{1,2}$/.test(s)) return "gradeRoom";
  if (/^(ม|ป|อ)\.?\s*\d+$/.test(noSp) || /^(มัธยม|ประถม|อนุบาล)/.test(s)) return "grade";
  if (/^(ชาย|หญิง|ช|ญ|male|female|m|f)$/i.test(s)) return "gender";
  if (teamNames && teamNames.some((n) => n && (s === n || noSp === n.replace(/\s/g, "") || s.replace(/^สี/, "") === n.replace(/^สี/, "")))) return "color";
  if (s.includes(" ")) return "fullName";
  return "word";
}
// เดาชนิดของทั้งคอลัมน์จากค่าส่วนใหญ่
function detectColumns(dataRows, teamNames) {
  const width = dataRows.reduce((m, r) => Math.max(m, r.length), 0);
  const types = [];
  for (let c = 0; c < width; c++) {
    const counts = {}; let n = 0;
    for (let r = 0; r < Math.min(dataRows.length, 20); r++) {
      const t = classifyCell((dataRows[r] || [])[c], teamNames);
      if (t === "empty") continue; counts[t] = (counts[t] || 0) + 1; n++;
    }
    let best = "skip", bn = -1;
    Object.keys(counts).forEach((k) => { if (counts[k] > bn) { best = k; bn = counts[k]; } });
    types.push(n ? best : "skip");
  }
  // จัดชื่อ: คอลัมน์ที่เป็นคำเดี่ยว ๆ → คอลัมน์แรก=ชื่อ, ถัดไป=นามสกุล
  let wordSeen = 0;
  return types.map((t) => {
    if (t === "num") return "skip";
    if (t === "word") { wordSeen++; return wordSeen === 1 ? "first" : "last"; }
    return t;
  });
}
function mappingFromHeader(headerRow, width) {
  return Array.from({ length: width }, (_, c) => {
    const h = impClean(headerRow[c]);
    if (/รหัส/.test(h)) return "id";
    if (/เบอร์|โทร/.test(h)) return "phone";
    if (/คำนำหน้า/.test(h)) return "pre";
    if (/ชื่อ.*สกุล|สกุล.*ชื่อ|ชื่อ-นามสกุล|ชื่อสกุล/.test(h)) return "fullName";
    if (/นามสกุล|สกุล/.test(h)) return "last";
    if (/ชื่อ/.test(h)) return "first";
    if (/ชั้น.*ห้อง|ห้อง.*ชั้น/.test(h)) return "gradeRoom";
    if (/ชั้น|ระดับ/.test(h)) return "grade";
    if (/ห้อง/.test(h)) return "room";
    if (/เพศ/.test(h)) return "gender";
    if (/สี|ทีม|คณะ/.test(h)) return "color";
    return "skip";
  });
}
const FIELD_OPTS = [
  ["skip", "— ข้าม —"], ["id", "รหัส"], ["phone", "เบอร์โทร"], ["pre", "คำนำหน้า"],
  ["first", "ชื่อ"], ["last", "นามสกุล"], ["fullName", "คำนำหน้า+ชื่อ+สกุล (รวม)"],
  ["grade", "ระดับชั้น"], ["room", "ห้อง"], ["gradeRoom", "ชั้น/ห้อง (รวม)"],
  ["gender", "เพศ"], ["color", "สี/ทีม"],
];
function applyMapping(dataRows, mapping, kind, houses, fileHouse, colorSeen) {
  return (dataRows || []).map((cells) => {
    const rec = { id: "", phone: "", pre: "", first: "", last: "", grade: "", room: "", gender: "", house: 0 };
    let fullName = "", gradeRoom = "", colorName = "";
    mapping.forEach((field, c) => {
      const val = impClean((cells || [])[c]);
      if (!val || field === "skip") return;
      if (field === "id") rec.id = rec.id || val;
      else if (field === "phone") { let d = cleanDigits(val); if (d && d[0] !== "0" && d.length === 9) d = "0" + d; rec.phone = d; }
      else if (field === "pre") rec.pre = expandPrefix(val);
      else if (field === "first") rec.first = rec.first || val;
      else if (field === "last") rec.last = rec.last ? rec.last + " " + val : val;
      else if (field === "fullName") fullName = fullName ? fullName + " " + val : val;
      else if (field === "grade") rec.grade = rec.grade || val;
      else if (field === "room") rec.room = rec.room || val;
      else if (field === "gradeRoom") gradeRoom = val;
      else if (field === "gender") rec.gender = /หญิง|^ญ$|female|^f$/i.test(val) ? "หญิง" : "ชาย";
      else if (field === "color") colorName = val;
    });
    if (fullName) { const s = impSplitName(fullName); rec.pre = rec.pre || expandPrefix(s.pre); rec.first = rec.first || s.first; rec.last = rec.last || s.last; }
    if (!rec.last && rec.first && (rec.first.includes(" ") || IMP_PREFIXES.some((p) => rec.first.startsWith(p)))) { const s = impSplitName(rec.first); rec.pre = rec.pre || expandPrefix(s.pre); rec.first = s.first; rec.last = s.last; }
    if (gradeRoom) { const gr = impSplitGradeRoom(gradeRoom); rec.grade = rec.grade || gr.grade; rec.room = rec.room || gr.room; }
    else if (rec.grade && !rec.room) { const gr = impSplitGradeRoom(rec.grade); if (gr.room) { rec.grade = gr.grade; rec.room = gr.room; } }
    if (colorSeen) {
      const i = (houses || []).findIndex((h) => h.name && (h.name === colorName || h.name.replace(/^สี/, "") === colorName.replace(/^สี/, "")));
      rec.house = i >= 0 ? i : 0;
    } else {
      rec.house = fileHouse || 0; // ไม่มีคอลัมน์สี → ใช้สีที่ผู้ใช้เลือกให้ทั้งไฟล์
    }
    return rec;
  }).filter((r) => r.id || r.first || r.last);
}

function ImportPreview({ kind, rawRows, existing, houses, onClose, onConfirm }) {
  const rows = (rawRows || []).filter((r) => r && r.some((c) => impClean(c) !== ""));
  const width = rows.reduce((m, r) => Math.max(m, r.length), 0);
  const teamNames = (houses || []).map((h) => h.name);
  const headerDetected = rows.length > 0 && impIsHeader(rows[0]);
  const [useHeader, setUseHeader] = useState(headerDetected);
  const [mapping, setMapping] = useState(() => headerDetected ? mappingFromHeader(rows[0] || [], width) : detectColumns(rows, teamNames));
  const [fileHouse, setFileHouse] = useState(0);
  const dataRows = useHeader ? rows.slice(1) : rows;
  const toggleHeader = (v) => { setUseHeader(v); const dr = v ? rows.slice(1) : rows; setMapping(v ? mappingFromHeader(rows[0] || [], width) : detectColumns(dr, teamNames)); };
  const setCol = (c, field) => setMapping((m) => m.map((x, i) => (i === c ? field : x)));
  const opts = kind === "teacher" ? FIELD_OPTS.filter((o) => ["skip", "id", "phone", "pre", "first", "last", "fullName"].includes(o[0])) : FIELD_OPTS;

  const colorSeen = mapping.includes("color");
  const parsed = applyMapping(dataRows, mapping, kind, houses, fileHouse, colorSeen);
  const fileSeen = new Set(existing.map((e) => String(e.id)));
  const marked = parsed.map((r) => {
    const idStr = String(r.id || ""); let dup = false, reason = "";
    if (!idStr) { dup = true; reason = "ไม่มีรหัส"; }
    else if (existing.some((e) => String(e.id) === idStr)) { dup = true; reason = "รหัสซ้ำในระบบ"; }
    else if (fileSeen.has(idStr)) { dup = true; reason = "ซ้ำในไฟล์"; }
    else fileSeen.add(idStr);
    return { r, dup, reason };
  });
  const toAdd = marked.filter((m) => !m.dup).map((m) => m.r);
  const skipped = marked.length - toAdd.length;
  const cellCss = { border: `1px solid ${C.line}`, padding: "6px 8px", fontSize: 12, color: C.ink, whiteSpace: "nowrap", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis" };

  return (
    <Modal title="นำเข้า — จับคู่คอลัมน์ & ตรวจสอบ" onClose={onClose} wide>
      <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, color: C.ink, marginBottom: 6, cursor: "pointer" }}>
        <input type="checkbox" checked={useHeader} onChange={(e) => toggleHeader(e.target.checked)} style={{ width: 17, height: 17 }} /> แถวแรกเป็นหัวตาราง (ไม่นำเข้าเป็นข้อมูล)
      </label>
      <p style={{ fontSize: 12.5, color: C.muted, marginTop: 0 }}>ระบบอ่านทุกเซลแล้วเดาให้ว่าคอลัมน์ไหนคืออะไร ปรับที่ช่องหัวตารางได้ ตัวอย่างจะอัปเดตทันที</p>
      {!colorSeen && (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <span style={{ fontSize: 13, color: C.muted }}>ไม่มีคอลัมน์ "สี" ใช้สีนี้กับทุกคนในไฟล์:</span>
          <Select value={fileHouse} onChange={(v) => { setFileHouse(Number(v)); }}>
            <option value={0}>ไม่ระบุ</option>
            {(houses || []).map((h, i) => <option key={h.name} value={i}>{h.name}</option>)}
          </Select>
        </div>
      )}
      <div style={{ overflowX: "auto", border: `1px solid ${C.line}`, borderRadius: 10, marginBottom: 12 }}>
        <table style={{ borderCollapse: "collapse", width: "100%" }}>
          <thead><tr>{mapping.map((f, c) => (
            <th key={c} style={{ border: `1px solid ${C.line}`, padding: 4, background: C.soft }}>
              <select value={f} onChange={(e) => setCol(c, e.target.value)} style={{ fontSize: 12, padding: "5px 6px", borderRadius: 8, border: `1px solid ${C.line}`, background: C.surface, color: f === "skip" ? C.muted : C.primaryDark, fontWeight: 600 }}>
                {opts.map((o) => <option key={o[0]} value={o[0]}>{o[1]}</option>)}
              </select>
            </th>
          ))}</tr></thead>
          <tbody>{dataRows.slice(0, 2).map((r, ri) => (
            <tr key={ri}>{mapping.map((f, c) => <td key={c} style={cellCss}>{impClean((r || [])[c]) || "—"}</td>)}</tr>
          ))}</tbody>
        </table>
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
        <Stat label="ทั้งหมด" v={marked.length} col={C.primary} />
        <Stat label="ใหม่ (จะโอน)" v={toAdd.length} col="#5aab84" />
        <Stat label="ซ้ำ/ข้าม" v={skipped} col="#d17f7a" />
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <Btn onClick={() => onConfirm(toAdd)} disabled={toAdd.length === 0}>โอนเข้าระบบ ({toAdd.length} คน)</Btn>
        <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
      </div>
      <div style={{ fontSize: 12, color: C.muted, marginBottom: 6 }}>ตัวอย่างที่แยกได้ (แสดง {Math.min(2, marked.length)} จาก {marked.length} คน):</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {marked.slice(0, 2).map((m, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: 10, borderRadius: 10, border: `1px solid ${m.dup ? "#eccdcd" : C.line}`, background: m.dup ? "#fbf1f1" : C.surface }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, color: C.ink, fontSize: 13.5 }}><span style={{ color: C.muted }}>[{m.r.pre || "—"}]</span> {m.r.first} {m.r.last}</div>
              <div style={{ fontSize: 11.5, color: C.muted }}>
                รหัส {m.r.id || "—"}{kind === "student" ? ` · ${m.r.grade || "?"}/${m.r.room || "?"}` : ""}{m.r.gender ? ` · ${m.r.gender}` : ""}{m.r.phone ? ` · ${m.r.phone}` : ""}{(houses && houses[m.r.house]) ? ` · ${houses[m.r.house].name}` : ""}
              </div>
            </div>
            {m.dup ? <span style={{ fontSize: 12, fontWeight: 700, color: "#c0392b", whiteSpace: "nowrap" }}>{m.reason}</span> : <span style={{ fontSize: 12, fontWeight: 700, color: "#2f9e6b" }}>ใหม่</span>}
          </div>
        ))}
        {marked.length === 0 && <Empty text="ยังแยกข้อมูลไม่ได้ — ลองปรับการจับคู่คอลัมน์ด้านบน หรือดูปุ่ม 'แม่แบบ'" />}
      </div>
    </Modal>
  );
}

function exportPeopleXLSX(list, houses, kind, filename) {
  if (typeof XLSX === "undefined") return false;
  const team = (i) => (houses && houses[i]) ? houses[i].name : "";
  const header = kind === "student"
    ? ["รหัสนักเรียน", "คำนำหน้า", "ชื่อ", "นามสกุล", "เพศ", "ระดับชั้น", "ห้อง", "เบอร์โทร", "สีทีม", "เป็นกรรมการ", "รหัสผ่านที่ตั้งเอง", "ผู้ปกครอง", "เบอร์ผู้ปกครอง", "ความเกี่ยวข้อง"]
    : ["รหัส", "คำนำหน้า", "ชื่อ", "นามสกุล", "เบอร์โทร", "สีทีม", "ผู้ใช้ (user)", "รหัสผ่านที่ตั้งเอง"];
  const rows = list.map((p) => kind === "student"
    ? [p.id, p.pre, p.first, p.last, p.gender || "", p.grade || "", p.room || "", p.phone || "", team(p.house), p.committee ? "ใช่" : "", p.password || "", p.guardian || "", p.guardianPhone || "", p.guardianRelation || ""]
    : [p.id, p.pre, p.first, p.last, p.phone || "", team(p.house), p.user || "", p.password || ""]);
  const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "รายชื่อ");
  XLSX.writeFile(wb, filename);
  return true;
}

function CommitteePicker({ kind, pool, isCom, onClose, onConfirm }) {
  const [grade, setGrade] = useState("");
  const [room, setRoom] = useState("");
  const [q, setQ] = useState("");
  const [sel, setSel] = useState([]);
  const candidates = pool.filter((p) => !isCom(p));
  const grades = [...new Set(candidates.map((s) => s.grade).filter(Boolean))];
  const rooms = [...new Set(candidates.map((s) => s.room).filter(Boolean))];
  const kw = q.trim();
  const filtered = candidates.filter((p) =>
    (kind === "teacher" || ((!grade || p.grade === grade) && (!room || p.room === room))) &&
    (!kw || fullName(p).includes(kw) || String(p.id).includes(kw)));
  const selSet = new Set(sel);
  const allSel = filtered.length > 0 && filtered.every((p) => selSet.has(p.id));
  const toggle = (id) => setSel((s) => s.includes(id) ? s.filter((x) => x !== id) : [...s, id]);
  const toggleAll = () => setSel(allSel ? sel.filter((id) => !filtered.some((p) => p.id === id)) : [...new Set([...sel, ...filtered.map((p) => p.id)])]);
  return (
    <Modal title={`เลือก${kind === "teacher" ? "ครู" : "นักเรียน"}ที่จะเป็นกรรมการ`} onClose={onClose} wide>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="ค้นหาชื่อ หรือรหัส"
        style={{ width: "100%", padding: "10px 12px", borderRadius: 10, border: `1px solid ${C.line}`, fontSize: 14, marginBottom: 10 }} />
      {kind === "student" && (
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 10 }}>
          <Select value={grade} onChange={setGrade}><option value="">ทุกชั้น</option>{grades.map((g) => <option key={g}>{g}</option>)}</Select>
          <Select value={room} onChange={setRoom}><option value="">ทุกห้อง</option>{rooms.map((r) => <option key={r} value={r}>ห้อง {r}</option>)}</Select>
        </div>
      )}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 8 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, cursor: "pointer" }}>
          <input type="checkbox" checked={allSel} onChange={toggleAll} style={{ width: 17, height: 17 }} /> เลือกทั้งหมด{kind === "student" ? "ที่กรอง" : ""} ({filtered.length})
        </label>
        <span style={{ fontSize: 13, color: C.muted }}>เลือก {sel.length}</span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 320, overflowY: "auto" }}>
        {filtered.map((p) => (
          <label key={p.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: 10, borderRadius: 10, border: `1px solid ${selSet.has(p.id) ? C.primary : C.line}`, background: selSet.has(p.id) ? C.soft : C.surface, cursor: "pointer" }}>
            <input type="checkbox" checked={selSet.has(p.id)} onChange={() => toggle(p.id)} style={{ width: 17, height: 17, flexShrink: 0 }} />
            <Avatar person={p} size={38} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, color: C.ink, fontSize: 13.5 }}>{fullName(p)}</div>
              <div style={{ fontSize: 12, color: C.muted }}>รหัส {p.id}{p.grade ? ` · ${p.grade}/${p.room}` : ""}</div>
            </div>
          </label>
        ))}
        {filtered.length === 0 && <Empty text="ไม่พบรายชื่อที่ยังไม่เป็นกรรมการ" />}
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
        <Btn onClick={() => onConfirm(sel)} disabled={sel.length === 0}>ตั้งเป็นกรรมการ ({sel.length})</Btn>
        <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
      </div>
    </Modal>
  );
}

function OrgEditor({ which, pool, pickPool, db, setDb, ui, editable, committeeLabel }) {
  const rows = db[which];
  const [addRow, setAddRow] = useState(null); // หมวดที่จะเพิ่ม "comp"|"act"
  const [editRow, setEditRow] = useState(null);
  const [assignTo, setAssignTo] = useState(null);
  const update = (fn) => setDb((p) => ({ ...p, [which]: fn(p[which]) }));
  const addPerson = (rowId, id) => ui.run("กำลังกำหนดรายชื่อ...", () => { update((rs) => rs.map((r) => r.id === rowId ? { ...r, people: [...new Set([...r.people, id])] } : r)); setAssignTo(null); });
  const removePerson = (rowId, id) => update((rs) => rs.map((r) => r.id === rowId ? { ...r, people: r.people.filter((x) => x !== id) } : r));
  const removeRow = (rowId) => ui.run("กำลังลบหน้าที่...", () => update((rs) => rs.filter((r) => r.id !== rowId)));
  const availPool = (pickPool || pool).filter((p) => !(rows.find((r) => r.id === assignTo)?.people || []).includes(p.id));

  const renderRow = (r, idx) => (
    <Card key={r.id} style={{ padding: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
        <div>
          <div style={{ fontWeight: 700, color: C.ink }}>{r.title}</div>
          <div style={{ fontSize: 12, color: C.muted }}>แถวที่ {idx + 1} · จำนวน {r.people.length} คน · ต่อจาก {r.after}</div>
        </div>
        {editable && (
          <div style={{ display: "flex", gap: 6 }}>
            <Btn variant="ghost" small onClick={() => setEditRow(r)}>แก้ชื่อแถว</Btn>
            <Btn variant="danger" small onClick={() => removeRow(r.id)}>ลบแถว</Btn>
          </div>
        )}
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 10 }}>
        {r.people.map((id) => {
          const p = pool.find((x) => x.id === id);
          if (!p) return null;
          return (
            <div key={id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px 6px 6px", borderRadius: 20, border: `1px solid ${C.line}` }}>
              <Avatar person={p} size={30} /><span style={{ fontSize: 13, color: C.ink }}>{p.first}</span>
              {editable && <button onClick={() => removePerson(r.id, id)} style={{ border: "none", background: "none", color: C.muted, cursor: "pointer", fontSize: 15 }}>×</button>}
            </div>
          );
        })}
        {editable && <button onClick={() => setAssignTo(r.id)} style={{ padding: "8px 12px", borderRadius: 20, border: `1.5px dashed ${C.line}`, background: C.surface, color: C.primary, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>+ กำหนดรายชื่อ</button>}
      </div>
    </Card>
  );
  const section = (cat, label) => {
    const catRows = rows.filter((r) => (r.cat || "comp") === cat);
    return (
      <div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, marginBottom: 8 }}>
          <div style={{ fontWeight: 800, color: C.primaryDark, fontSize: 15 }}>{label} <span style={{ fontSize: 12, fontWeight: 500, color: C.muted }}>({catRows.length} แถว)</span></div>
          {editable && <Btn small onClick={() => setAddRow(cat)}>+ เพิ่มหน้าที่ / แถว</Btn>}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {catRows.map((r, idx) => renderRow(r, idx))}
          {catRows.length === 0 && <Empty text="ยังไม่มีแถวในหมวดนี้" />}
        </div>
      </div>
    );
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      {editable && <div style={{ fontSize: 12.5, color: C.muted }}>เลือกรายชื่อจาก{committeeLabel} ({(pickPool || []).length} คน)</div>}
      {section("comp", "รายการแข่งขัน")}
      {section("act", "รายการกิจกรรม")}
      {assignTo && <SearchPersonPopup title={`เลือกจาก${committeeLabel}`} pool={availPool} emptyText={`ยังไม่มี${committeeLabel} — ไปตั้งกรรมการที่ บุคลากร → บัญชีผู้ใช้ ก่อน`} onClose={() => setAssignTo(null)} onPick={(p) => addPerson(assignTo, p.id)} />}
      {addRow && <RowForm onClose={() => setAddRow(null)} onSave={(row) => ui.run("กำลังเพิ่มหน้าที่...", () => { update((rs) => [...rs, { ...row, cat: addRow, id: "r" + Date.now(), people: [] }]); setAddRow(null); })} />}
      {editRow && <RowForm row={editRow} onClose={() => setEditRow(null)} onSave={(row) => ui.run("กำลังบันทึกแถว...", () => { update((rs) => rs.map((x) => x.id === editRow.id ? { ...x, title: row.title, after: row.after } : x)); setEditRow(null); })} />}
    </div>
  );

  );
}

function JudgeAssign({ comp, cat, db, setDb, onClose }) {
  const cur = db.competitions.find((c) => c.id === comp.id) || comp;
  const jt = cur.judgeTeachers || [], js = cur.judgeStudents || [];
  const update = (patch) => setDb((p) => ({ ...p, competitions: p.competitions.map((c) => c.id === comp.id ? { ...c, ...patch } : c) }));
  const K = (rowId, id) => `${rowId}::${id}`;
  const toggle = (arr, patchKey, rowId, id) => { const k = K(rowId, id); update({ [patchKey]: arr.includes(k) ? arr.filter((x) => x !== k) : [...arr, k] }); };
  const section = (allRows, pool, selected, patchKey, label) => {
    const rows = allRows.filter((r) => (r.cat || "comp") === cat);
    return (
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontWeight: 700, color: C.ink, marginBottom: 8 }}>{label} <span style={{ fontSize: 12, fontWeight: 500, color: C.muted }}>(เลือกแล้ว {selected.length})</span></div>
        {rows.length === 0 && <div style={{ fontSize: 12.5, color: C.muted }}>ยังไม่มีแถวหมวดนี้ในผังองค์กร — ไปสร้างที่ ผังองค์กร ก่อน</div>}
        {rows.map((r, i) => (
          <div key={r.id} style={{ marginBottom: 12, padding: 10, border: `1px solid ${C.line}`, borderRadius: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, gap: 8 }}>
              <div style={{ fontSize: 12.5, fontWeight: 600, color: C.primaryDark }}>แถวที่ {i + 1} · {r.title}</div>
              {r.people.length > 0 && <button onClick={() => update({ [patchKey]: [...new Set([...selected, ...r.people.map((id) => K(r.id, id))])] })} style={{ border: "none", background: C.soft, color: C.primaryDark, borderRadius: 16, padding: "4px 10px", fontSize: 11.5, fontWeight: 700, cursor: "pointer" }}>+ เพิ่มทั้งแถว</button>}
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {r.people.length === 0 && <span style={{ fontSize: 12, color: C.muted }}>— ไม่มีรายชื่อ —</span>}
              {r.people.map((id) => {
                const p = pool.find((x) => x.id === id); if (!p) return null;
                const on = selected.includes(K(r.id, id));
                return <button key={id} onClick={() => toggle(selected, patchKey, r.id, id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 10px 5px 5px", borderRadius: 20, border: `1px solid ${on ? C.primary : C.line}`, background: on ? C.soft : C.surface, color: on ? C.primaryDark : C.ink, cursor: "pointer", fontSize: 13, fontWeight: on ? 700 : 500 }}>
                  <Avatar person={p} size={26} />{p.first}{on ? " ✓" : ""}
                </button>;
              })}
            </div>
          </div>
        ))}
      </div>
    );
  };
  return (
    <Modal title={`จัดกรรมการ: ${comp.name}`} onClose={onClose} wide>
      <p style={{ fontSize: 12.5, color: C.muted, marginTop: 0 }}>แตะรายชื่อเพื่อเพิ่ม/นำออก · เลือกแยกตามแถว (คนเดียวกันในคนละแถวนับแยกกัน) · แสดงเฉพาะผังหมวด{cat === "comp" ? "แข่งขัน" : "กิจกรรม"}</p>
      {section(db.orgTeacher, db.teachers, jt, "judgeTeachers", "กรรมการครู")}
      {section(db.orgStudent, db.students, js, "judgeStudents", "กรรมการนักเรียน")}
      <div style={{ display: "flex", gap: 8 }}><Btn onClick={onClose}>เสร็จสิ้น</Btn></div>
    </Modal>
  );
}

function AnnounceBlock({ lines, speed, showLines = 3 }) {
  const news = (lines && lines.length) ? lines : ["(ยังไม่มีข้อความประชาสัมพันธ์)"];
  return (
    <Card style={{ overflow: "hidden" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 16px", borderBottom: `1px solid ${C.line}` }}>
        <span style={{ background: C.gold, color: "#fff", fontSize: 12, fontWeight: 700, padding: "3px 10px", borderRadius: 20 }}>ประชาสัมพันธ์</span>
        <span style={{ fontSize: 11.5, color: C.muted, marginLeft: "auto" }}>ตัวอย่างการแสดงผลจริง</span>
      </div>
      <div style={{ height: 40 * (showLines || 3), overflow: "hidden", padding: "0 16px" }}>
        <div style={{ animation: `scrollUp ${speed}s linear infinite` }}>
          {[...news, ...news].map((n, i) => <div key={i} style={{ padding: "10px 0", borderBottom: `1px dashed ${C.line}`, color: C.ink, fontSize: 14 }}>• {n}</div>)}
        </div>
      </div>
    </Card>
  );
}
function PromoCard({ db, setDb, ui }) {

        <div className="md:grid md:grid-cols-2 md:gap-x-3">

      </Card>

        <span style={{ display: "block", fontSize: 13, color: C.muted, marginBottom: 6 }}>ตัวอย่างที่จะแสดงหน้าแรก (อัปเดตสดตามที่พิมพ์)</span>
        <AnnounceBlock lines={previewLines} speed={speed} showLines={showLines} />
      </div>
    </div>

function mergeDb(loaded) {
  const s = loaded && loaded.settings ? loaded.settings : {};
  return {
    students: (loaded && loaded.students) || [],
    teachers: (loaded && loaded.teachers) || [],
    assistants: (loaded && loaded.assistants) || [],
    competitions: (loaded && loaded.competitions) || [],
    orgTeacher: (loaded && loaded.orgTeacher) || [],

function StatusBar({ status, lastSaved, onSave, onRetry }) {
  const map = {
    loading: ["กำลังโหลดข้อมูล…", C.muted, false],
    dirty: ["มีการแก้ไข • กำลังจะบันทึก", C.gold, true],
    saving: ["กำลังบันทึก…", C.gold, false],
    saved: ["บันทึกแล้ว", "#5aab84", true],
    offline: ["บันทึกไม่สำเร็จ", "#d17f7a", true],
    local: ["โหมดทดลอง (ไม่บันทึกถาวร)", C.muted, false],
  };
  const [txt, col, showBtn] = map[status] || ["", C.muted, false];
  const spinning = status === "saving" || status === "loading";
  const err = status === "offline";
  const time = (status === "saved" && lastSaved) ? " " + new Date(lastSaved).toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit", second: "2-digit" }) : "";
  return (
    <div className="md:bottom-6" style={{ position: "fixed", left: 10, bottom: 80, zIndex: 40, display: "flex", alignItems: "center", gap: 8,
      background: err ? "#fbeeee" : C.surface, border: `1px solid ${err ? "#eccdcd" : C.line}`, borderRadius: 22, padding: "6px 8px 6px 12px", boxShadow: "0 2px 10px rgba(0,0,0,.08)" }}>
      {spinning
        ? <span style={{ width: 12, height: 12, borderRadius: "50%", border: `2px solid ${C.line}`, borderTopColor: col, animation: "spin .8s linear infinite" }} />
        : <span style={{ width: 8, height: 8, borderRadius: "50%", background: col }} />}
      <span style={{ fontSize: 12, fontWeight: 600, color: col }}>{txt}{time}</span>
      {showBtn && (onSave || onRetry) && (
        <button onClick={err ? (onRetry || onSave) : onSave} style={{ border: "none", cursor: "pointer", borderRadius: 16, padding: "5px 12px", fontSize: 12, fontWeight: 700, background: err ? "#d17f7a" : C.soft, color: err ? "#fff" : C.primaryDark }}>
          {err ? "โหลดใหม่/ลองอีกครั้ง" : "บันทึก"}
        </button>
      )}
    </div>
  );
}

function toast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

  const dbRef = useRef(db);
  dbRef.current = db;
  const dirtyRef = useRef(false); // มีการแก้ไขที่ยังไม่ถูกบันทึกหรือไม่

  // แกนบันทึกจริง (ไม่ติดล็อก) — ใช้ทั้งออโต้เซฟและปุ่มบันทึกเอง
  const doSave = () => {
    if (!API_URL) return;
    if (savingRef.current) { againRef.current = true; return; }
    savingRef.current = true;
    setSync("saving");
    let st = 0;
    fetch(API_URL, { method: "POST", body: JSON.stringify({ type: "data", data: dbRef.current }) })
      .then((r) => { st = r.status; return r.text(); })
      .then((t) => {
        window.__saveLog = `POST HTTP ${st} · ตอบกลับ: ${String(t).slice(0, 140)}`;
        let j; try { j = JSON.parse(t); } catch (e) { throw new Error("ตอบกลับไม่ใช่ JSON (มักเป็นเพราะ Deploy ไม่ได้ตั้ง Who has access = Anyone): " + String(t).slice(0, 80)); }
        if (!j.ok) throw new Error(j.error || "server ok=false");
        dirtyRef.current = false; loadedRef.current = true; // บันทึกได้ = เชื่อมต่อได้ ปลดล็อกออโต้เซฟ
        setSync("saved"); setLastSaved(Date.now());
      })
      .catch((err) => { window.__saveLog = "POST ผิดพลาด: " + ((err && err.message) || String(err)); console.warn("[บันทึกไม่สำเร็จ]", err); setSync("offline"); })
      .then(() => { savingRef.current = false; if (againRef.current) { againRef.current = false; doSave(); } });
  };
  const pushSave = () => { if (!loadedRef.current) return; doSave(); }; // ออโต้เซฟ: ทำเฉพาะเมื่อโหลดสำเร็จ (กันเขียนทับ)
  const saveNow = () => { clearTimeout(timerRef.current); doSave(); }; // กดเอง: บังคับบันทึกเสมอ
  const retryLoad = () => { setSync("loading"); loadData(); };

  // โหลดข้อมูลจาก Google Sheet ตอนเปิดหน้า — ต้องสำเร็จก่อนถึงจะอนุญาตให้ออโต้เซฟ
  const loadData = () => {
    if (!API_URL) return;
    fetch(API_URL).then((r) => r.text()).then((t) => {
      let j; try { j = JSON.parse(t); } catch (e) { throw new Error("ตอบกลับไม่ใช่ JSON"); }
      if (!j.ok) throw new Error(j.error || "ไม่สำเร็จ");
      if (j.data) { try { setDb(mergeDb(JSON.parse(j.data))); justLoaded.current = true; } catch (e) {} }
      loadedRef.current = true;
      setSync("saved"); setLastSaved(Date.now());
    }).catch((err) => { console.warn("[โหลดไม่สำเร็จ]", err); loadedRef.current = false; setSync("offline"); });
  };
  useEffect(() => { if (auth) toast("กลับสู่ระบบ"); loadData(); }, []);

  // ออโต้เซฟหลังหยุดแก้ไข ~2 วินาที (ทำงานเฉพาะเมื่อโหลดข้อมูลเดิมสำเร็จแล้ว)
  useEffect(() => {
    if (!API_URL || !loadedRef.current) return;
    if (justLoaded.current) { justLoaded.current = false; return; }
    dirtyRef.current = true;
    setSync("dirty");
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(pushSave, 2000);
  }, [db]);

  // กันข้อมูลหายตอนปิด/รีเฟรชหน้า: ถ้ายังมีค้างไม่บันทึก ให้ยิงบันทึกทันทีด้วย sendBeacon
  useEffect(() => {
    const flush = () => {
      if (!API_URL || !loadedRef.current || !dirtyRef.current) return;
      try {
        const body = JSON.stringify({ type: "data", data: dbRef.current });
        if (navigator.sendBeacon) navigator.sendBeacon(API_URL, new Blob([body], { type: "text/plain" }));
      } catch (e) {}
    };
    window.addEventListener("beforeunload", flush);
    window.addEventListener("pagehide", flush);
    return () => { window.removeEventListener("beforeunload", flush); window.removeEventListener("pagehide", flush); };
  }, []);
  // ธีมสี: แอดมินใช้สีธีมที่ตั้งไว้ · ครู/กรรมการ/นักเรียน ใช้สีทีมของตัวเอง
  const teamColors = db.settings.houses && db.settings.houses.length ? db.settings.houses : DEFAULT_HOUSES;
  let themeColor = db.settings.themeColor || (teamColors[0] && teamColors[0].color) || DEFAULT_HOUSES[0].color;
  if (auth && (auth.role === "teacher" || auth.role === "studentcom" || auth.role === "student")) {
    const pool = auth.role === "teacher" ? db.teachers : db.students;
    const me = pool.find((x) => String(x.id) === String(auth.id));
    if (me && teamColors[me.house]) themeColor = teamColors[me.house].color;
  }
  C = makeTheme(themeColor);
  HOUSES = teamColors.map((h) => h.color);
  const exit = () => { localStorage.removeItem("auth"); setAuth(null); setScreen("landing"); };
  return (
    <div style={{ fontFamily: "'Noto Sans Thai', system-ui, sans-serif", color: C.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scrollUp { from { transform: translateY(0); } to { transform: translateY(-50%); } }
        input[type=range] { accent-color: ${C.primary}; }
        textarea:focus, input:focus { border-color: ${C.primary}; }
        input::placeholder, textarea::placeholder { color: #bcb6c9; opacity: 1; }
        input, textarea, select { color: ${C.ink}; }
      `}</style>
      {API_URL && screen === "app" && <StatusBar status={sync} lastSaved={lastSaved} onSave={saveNow} onRetry={() => { if (loadedRef.current) saveNow(); else loadData(); }} />}
      {screen === "landing" && <Landing onLogin={() => setScreen("login")} announce={db.settings.announce} comps={db.competitions} />}
      {screen === "login" && <Login db={db} onEnter={(a) => { setAuth(a); setScreen("app"); }} onBack={() => setScreen("landing")} />}
      {screen === "app" && auth?.role === "admin" && <AdminApp db={db} setDb={setDb} onExit={exit} />}
      {screen === "app" && (auth?.role === "teacher" || auth?.role === "studentcom") && <CommitteeApp role={auth.role} db={db} setDb={setDb} onExit={exit} />}
      {screen === "app" && auth?.role === "student" && <StudentApp meId={auth.id} db={db} setDb={setDb} onExit={exit} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<style>
.toast {
  position: fixed; z-index: 100; left: 50%; bottom: 0;
  padding: 12px 14px; border-radius: 24px;
  transform: translate(-50%, -24px); transition: transform 0.3s ease-out;
  box-shadow: 0 2px 20px rgba(0,0,0,.2); animation: fade-in .3s ease-out;
  background: rgba(24,38,53,.88); color: white; font-size: 14px;
}
@keyframes fade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
</style>
</body>
